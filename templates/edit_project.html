{% extends "base.html" %}
{% block title %}Edit Project{% endblock %}
{% block page_title %}<i class="bi bi-pencil-fill me-2 text-primary"></i>Edit Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-7">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('project.projects') }}" class="btn btn-sm btn-light">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <div>
                <h4 class="fw-800 mb-0" style="font-weight:800;">Edit Project</h4>
                <p class="text-muted mb-0" style="font-size:.83rem;">Update project details and assignment.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex align-items-center gap-2">
                <i class="bi bi-kanban-fill text-primary"></i>
                Edit: <strong class="ms-1">{{ project.project_name }}</strong>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('project.edit_project', project_id=project._id) }}">

                    <div class="mb-3">
                        <label class="form-label">Project Name *</label>
                        <input type="text" name="project_name" class="form-control"
                               value="{{ project.project_name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description *</label>
                        <textarea name="description" class="form-control" rows="3" required>{{ project.description }}</textarea>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-7">
                            <label class="form-label">Assigned To *</label>
                            <select name="employee_id" class="form-select" required>
                                {% for emp in employees %}
                                <option value="{{ emp.employee_id }}"
                                    {% if emp.employee_id == project.employee_id %}selected{% endif %}>
                                    {{ emp.name }} — {{ emp.department }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-5">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                <option value="Ongoing" {% if project.status == 'Ongoing' %}selected{% endif %}>Ongoing</option>
                                <option value="Completed" {% if project.status == 'Completed' %}selected{% endif %}>Completed</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i>Save Changes
                        </button>
                        <a href="{{ url_for('project.projects') }}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
